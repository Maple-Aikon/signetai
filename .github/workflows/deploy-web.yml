name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docs/**'
      - '!**/*.test.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd web/marketing && bun install

      - name: Build
        run: cd web/marketing && bun run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a19f770b9be1b20e78b8d25bdcfd3bbd
          workingDirectory: web/marketing
          command: deploy
          packageManager: bun
