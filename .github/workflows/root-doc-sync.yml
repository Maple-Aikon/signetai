name: Root Docs Sync

on:
  pull_request:
    paths:
      - "CONTRIBUTING.md"
      - "ROADMAP.md"
      - "docs/CONTRIBUTING.md"
      - "docs/ROADMAP.md"
      - "scripts/sync-root-docs.ts"
      - ".github/workflows/root-doc-sync.yml"
  push:
    branches: [main]
    paths:
      - "CONTRIBUTING.md"
      - "ROADMAP.md"
      - "docs/CONTRIBUTING.md"
      - "docs/ROADMAP.md"
      - "scripts/sync-root-docs.ts"
      - ".github/workflows/root-doc-sync.yml"

permissions:
  contents: read

jobs:
  check-root-doc-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Verify root-derived docs are in sync
        run: bun scripts/sync-root-docs.ts --check
