[package]
name = "signet-native"
version = "0.39.0"
edition = "2021"
license = "Apache-2.0"
description = "Signet native accelerators (napi-rs)"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi4"] }
napi-derive = "2"
sha2 = "0.10"

# No new deps needed — RaBitQ uses a hand-rolled xoshiro128** PRNG
# matching the TS implementation for bit-exact determinism.

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = true
